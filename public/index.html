<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Olimpíada IDB</title>
  
  <!-- Material Design Styles -->
  <link rel="stylesheet" href="css/material-theme.css">
  <link rel="stylesheet" href="css/material-components.css">
  <link rel="stylesheet" href="css/material-layout.css">
  
  <style>
    .login-container {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: linear-gradient(135deg, var(--md-primary) 0%, var(--md-tertiary) 100%);
      padding: var(--md-spacing-lg);
    }

    .login-card {
      width: 100%;
      max-width: 400px;
    }

    .login-header {
      text-align: center;
      margin-bottom: var(--md-spacing-xl);
    }

    .login-logo {
      width: 80px;
      height: 80px;
      background: linear-gradient(135deg, #FFFFFF, #E3F2FD);
      border-radius: var(--md-shape-corner-extra-large);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
      margin: 0 auto var(--md-spacing-md);
      box-shadow: var(--md-elevation-3);
    }

    .login-form {
      display: flex;
      flex-direction: column;
      gap: var(--md-spacing-lg);
    }

    .login-footer {
      margin-top: var(--md-spacing-lg);
      text-align: center;
      font: var(--md-body-small-font);
      color: var(--md-on-surface-variant);
    }

    .alert {
      padding: var(--md-spacing-md);
      border-radius: var(--md-shape-corner-small);
      margin-bottom: var(--md-spacing-md);
      display: none;
      font: var(--md-body-medium-font);
    }

    .alert-error {
      background-color: var(--md-error-container);
      color: var(--md-on-error-container);
    }

    .alert-success {
      background-color: var(--md-success-container);
      color: var(--md-on-success-container);
    }
  </style>
</head>
<body>
  <div class="login-container">
    <div class="md-card md-card-elevated login-card">
      <div class="md-card-content">
        <div class="login-header">
          <div class="login-logo">🏆</div>
          <h1 class="md-headline-medium" style="margin: 0 0 var(--md-spacing-xs) 0; color: var(--md-on-surface);">
            Olimpíada IDB
          </h1>
          <p class="md-body-medium" style="margin: 0; color: var(--md-on-surface-variant);">
            Sistema de Gestão de Olimpíadas
          </p>
        </div>

        <div id="alert" class="alert"></div>

        <form class="login-form" id="loginForm" onsubmit="handleLogin(event)">
          <!-- Email -->
          <div class="md-text-field">
            <input 
              type="email" 
              id="email" 
              class="md-text-field-input" 
              placeholder=" "
              required
              autocomplete="email"
            >
            <label for="email" class="md-text-field-label">Email</label>
            <div class="md-text-field-supporting">Digite seu email institucional</div>
          </div>

          <!-- Senha -->
          <div class="md-text-field">
            <input 
              type="password" 
              id="senha" 
              class="md-text-field-input" 
              placeholder=" "
              required
              autocomplete="current-password"
            >
            <label for="senha" class="md-text-field-label">Senha</label>
            <div class="md-text-field-supporting">Digite sua senha</div>
          </div>

          <!-- Lembrar-me -->
          <label style="display: flex; align-items: center; gap: var(--md-spacing-sm); cursor: pointer;">
            <input type="checkbox" class="md-checkbox" id="lembrar">
            <span class="md-label-large">Lembrar-me</span>
          </label>

          <!-- Botão de Login -->
          <button type="submit" class="md-button md-button-filled md-button-large">
            <span class="material-icons">login</span>
            Entrar
          </button>

          <!-- Link para recuperar senha -->
          <div style="text-align: center;">
            <a href="#" class="md-label-large" style="color: var(--md-primary); text-decoration: none;">
              Esqueceu sua senha?
            </a>
          </div>
        </form>

        <div class="login-footer">
          <p>© 2025 Olimpíada IDB. Todos os direitos reservados.</p>
        </div>
      </div>
    </div>
  </div>


  <script>
    async function handleLogin(event) {
      event.preventDefault();
      
      const email = document.getElementById('email').value;
      const senha = document.getElementById('senha').value;
      const alert = document.getElementById('alert');
      const submitBtn = event.target.querySelector('button[type="submit"]');

      // Desabilitar botão
      submitBtn.disabled = true;
      submitBtn.innerHTML = '<span class="material-icons">hourglass_empty</span> Entrando...';

      try {
        const response = await fetch('/api/auth/login', {
          method: 'POST',
          headers: {
            'Content-Type': 'application/json',
          },
          body: JSON.stringify({ email, senha })
        });

        const data = await response.json();

        if (response.ok) {
          // Salvar token e dados do usuário
          localStorage.setItem('token', data.token);
          localStorage.setItem('user', JSON.stringify(data.usuario || data.user));

          // Mostrar sucesso
          alert.className = 'alert alert-success';
          alert.textContent = '✓ Login realizado com sucesso! Redirecionando...';
          alert.style.display = 'block';

          // Redirecionar após 1 segundo
          setTimeout(() => {
            window.location.href = 'pages/dashboard.html';
          }, 1000);
        } else {
          // Mostrar erro
          alert.className = 'alert alert-error';
          alert.textContent = '✕ ' + (data.message || 'Email ou senha inválidos');
          alert.style.display = 'block';
          
          // Reabilitar botão
          submitBtn.disabled = false;
          submitBtn.innerHTML = '<span class="material-icons">login</span> Entrar';
        }
      } catch (error) {
        console.error('Erro ao fazer login:', error);
        alert.className = 'alert alert-error';
        alert.textContent = '✕ Erro ao conectar ao servidor';
        alert.style.display = 'block';
        
        // Reabilitar botão
        submitBtn.disabled = false;
        submitBtn.innerHTML = '<span class="material-icons">login</span> Entrar';
      }
    }

    // Verificar se já está logado
    const token = localStorage.getItem('token');
    if (token) {
      window.location.href = 'pages/dashboard.html';
    }
  </script>
</body>
</html>
